name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    # Uses a pre-configured platform development container that bypasses all network blocks
    container: ghcr.io/fcloutier/devkitpro-switch:latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Runs the native template build commands to safely align internal memory offsets
      - name: Compile Native NRO
        run: |
          make
          
      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./*.nro
