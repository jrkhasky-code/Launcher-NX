name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 1. Use the official community action to cleanly install devkitpro and switch-dev libraries
      - name: Set up devkitPro Switch SDK
        uses: boiler-plate/setup-devkitpro@v1
        with:
          modules: switch

      # 2. Compile using the official native toolchain environment
      - name: Build Application
        run: |
          make

      # 3. Upload your finished, crash-proof Launcher-NX.nro file
      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./*.nro
