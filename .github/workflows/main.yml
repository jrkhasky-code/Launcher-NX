name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Compile and Link Launcher-NX
        run: |
          export PATH=$DEVKITPRO/devkitA64/bin:$PATH
          
          # 1. Compile source into an ARM64 object file
          aarch64-none-elf-g++ -O2 -fPIE -march=armv8-a+crc+crypto -mtune=cortex-a57 -I$DEVKITPRO/libnx/include -c main.cpp -o main.o
          
          # 2. Link object directly with the native crt0 startup environment mapping
          aarch64-none-elf-g++ -specs=$DEVKITPRO/libnx/switch.specs -fPIE -pie main.o $DEVKITPRO/libnx/lib/crt0.o -L$DEVKITPRO/libnx/lib -lnx -o Launcher-NX.elf
          
          # 3. Package everything into the final Switch app bundle
          elf2nro Launcher-NX.elf Launcher-NX.nro --title="Launcher-NX" --author="Homebrew Dev" --version="1.0.0"

      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./Launcher-NX.nro
