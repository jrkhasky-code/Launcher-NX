name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    # Fixed: Uses the official pre-configured Switch development container image
    container: devkitpro/nx-development:latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Runs the native template build commands to safely align internal memory offsets
      # Since switch-dev is pre-installed here, we skip pacman commands entirely
      - name: Compile Native NRO
        run: |
          export PATH=$DEVKITPRO/devkitA64/bin:$PATH
          make
          
      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./*.nro
