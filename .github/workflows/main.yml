name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Compile and Link Launcher-NX
        run: |
          export PATH=$DEVKITPRO/devkitA64/bin:$PATH
          
          # 1. Define custom layout boundaries including internal BSS tracking symbols
          cat << 'EOF' > switch.ld
          PHDRS {
            text PT_LOAD FLAGS(5);
            rodata PT_LOAD FLAGS(4);
            data PT_LOAD FLAGS(6);
          }
          SECTIONS {
            . = 0x80000000;
            .text : { *(.text*) } :text
            . = ALIGN(0x1000);
            .rodata : { *(.rodata*) } :rodata
            . = ALIGN(0x1000);
            .data : { *(.data*) } :data
            
            . = ALIGN(0x1000);
            __bss_start__ = .;
            .bss : { *(.bss*) *(COMMON) } :data
            __bss_end__ = .;
            __end__ = .;
          }
          EOF
          
          # 2. Compile source into an ARM64 object file
          aarch64-none-elf-g++ -O2 -ffunction-sections -fdata-sections -fPIE -march=armv8-a+crc+crypto -mtune=cortex-a57 -c main.cpp -o main.o
          
          # 3. Link using our complete custom segment layout file to satisfy the phdr and symbol verification blocks
          aarch64-none-elf-g++ -shared -fPIE -pie -T switch.ld main.o -o Launcher-NX.elf
          
          # 4. Package the tailored binary directly into your clean executable Switch .nro file format
          elf2nro Launcher-NX.elf Launcher-NX.nro --title="Launcher-NX" --author="Homebrew Dev" --version="1.0.0"

      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./Launcher-NX.nro
