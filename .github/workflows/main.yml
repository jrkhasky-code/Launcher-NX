name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 1. Official community workflow that pulls down the verified Switch libraries safely
      - name: Install Verified Switch SDK
        uses: turtlesec-no/get-devkitpro@v1
        with:
          dkp-packages: switch-dev

      # 2. Compile and link the code using the native framework rules
      - name: Run Toolchain Build Rules
        run: |
          export PATH=$DEVKITPRO/devkitA64/bin:$PATH
          make

      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./*.nro
