name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Forces the compiler to link statically as a unified object to bypass all machine representation errors
      - name: Direct Compile and Link Launcher-NX
        run: |
          export PATH=$DEVKITPRO/devkitA64/bin:$PATH
          
          # 1. Compile and link main.cpp cleanly into a static executable payload file
          aarch64-none-elf-g++ -O2 -static -fPIE -pie -march=armv8-a+crc+crypto -mtune=cortex-a57 main.cpp -o Launcher-NX.elf
          
          # 2. Convert that raw payload directly into your clean executable Switch .nro format
          elf2nro Launcher-NX.elf Launcher-NX.nro --title="Launcher-NX" --author="Homebrew Dev" --version="1.0.0"

      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./Launcher-NX.nro
