
name: Build NX-LAUNCHER 

on:  
push:  
branches: \[ "main", "master" \]  
pull\_request:  
branches: \[ "main", "master" \]  
workflow\_dispatch: 

jobs:  
build:  
runs-on: ubuntu-latest  
container: devkitpro/devkitproworkers:20260215 # Up-to-date stable compiler environment 

steps:  
\- name: Checkout Repository Codebase  
uses: actions/checkout@v4 

\- name: Install Nintendo Switch Toolchain Dependencies  
run: |  
\# Synchronize package databases and install devkitPro Switch modules  
sudo dkp-pacman -Syu --noconfirm  
sudo dkp-pacman -S --noconfirm switch-dev switch-tools switch-libnx 

\- name: Execute Makefile Compilation  
run: |  
\# Instruct the toolchain to compile the source code down into an NRO binary  
make clean  
make -j$(nproc) 

\- name: Archive Compiled NRO Artifact  
uses: actions/upload-artifact@v4  
with:  
name: NX-LAUNCHER-Executable  
path: |  
\*.nro
