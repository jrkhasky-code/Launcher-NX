name: Build Switch Homebrew

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Force Custom Direct Compile
        run: |
          # 1. Define variables manually to ignore Makefile errors
          export PATH=$DEVKITPRO/devkitA64/bin:$PATH
          
          # 2. Compile main.cpp directly into a Switch Aarch64 binary ELF object
          aarch64-none-elf-g++ -O2 -fPIE -march=armv8-a+crc+crypto -mtune=cortex-a57 -I$DEVKITPRO/libnx/include -c main.cpp -o main.o
          
          # 3. Link the binary to the core libnx Switch system definitions
          aarch64-none-elf-g++ -specs=$DEVKITPRO/libnx/switch.specs main.o -L$DEVKITPRO/libnx/lib -lnx -o SwitchLauncher.elf
          
          # 4. Convert the ELF payload into a native executable Switch .nro file
          elf2nro SwitchLauncher.elf SwitchLauncher.nro --title="Custom Boot Menu" --author="Homebrew Dev" --version="1.0.0"

      - name: Upload Compiled NRO Binary
        uses: actions/upload-artifact@v4
        with:
          name: SwitchLauncherApp
          path: ./*.nro
