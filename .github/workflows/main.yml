name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Generates a valid layout footprint to completely satisfy the 3 phdrs and bss validation blocks
      - name: Compile and Link Launcher-NX
        run: |
          export PATH=$DEVKITPRO/devkitA64/bin:$PATH
          
          # 1. Dynamically write out an absolute architecture mapping script
          cat << 'EOF' > switch.ld
          PHDRS {
            text PT_LOAD FLAGS(5);    /* Text Segment: Read + Execute */
            rodata PT_LOAD FLAGS(4);  /* RoData Segment: Read Only */
            data PT_LOAD FLAGS(6);    /* Data Segment: Read + Write */
          }
          SECTIONS {
            . = 0x80000000;
            
            .text : { 
              *(.text*) 
            } :text
            
            . = ALIGN(0x1000);
            .rodata : { 
              *(.rodata*) 
            } :rodata
            
            . = ALIGN(0x1000);
            .data : { 
              *(.data*) 
            } :data
            
            . = ALIGN(0x1000);
            __bss_start__ = .;
            .bss : { 
              *(.bss*) 
              *(COMMON) 
            } :data
            __bss_start_nro__ = __bss_start__;
            __bss_end__ = .;
            __end__ = .;
          }
          EOF
          
          # 2. Compile source code into a clean position-independent object file
          aarch64-none-elf-g++ -O2 -ffunction-sections -fdata-sections -fPIE -march=armv8-a+crc+crypto -mtune=cortex-a57 -c main.cpp -o main.o
          
          # 3. Link as a shared payload using our strict 3-segment custom layout script
          aarch64-none-elf-g++ -shared -fPIE -pie -T switch.ld main.o -o Launcher-NX.elf
          
          # 4. Safely package the verified binary layout directly into your clean executable Switch .nro format
          elf2nro Launcher-NX.elf Launcher-NX.nro --title="Launcher-NX" --author="Homebrew Dev" --version="1.0.0"

      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./Launcher-NX.nro
