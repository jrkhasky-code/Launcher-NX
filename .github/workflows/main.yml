name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 1. Official modern devkitPro installation method via their script pipeline
      - name: Install devkitPro Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y pacman-package-manager wget gdebi-core
          
          # Download and execute the official installer script
          wget https://apt.devkitpro.org/install-devkitpro-pacman
          chmod +x ./install-devkitpro-pacman
          sudo ./install-devkitpro-pacman --noconfirm
          
          # Force sync and install the entire Switch dev ecosystem
          sudo /opt/devkitpro/pacman/bin/pacman -Syy --noconfirm
          sudo /opt/devkitpro/pacman/bin/pacman -S switch-dev --noconfirm

      # 2. Generates a clean, platform-native Makefile mapping variables safely
      - name: Generate Official Build Manifest
        run: |
          cat << 'EOF' > Makefile
          export DEVKITPRO  := /opt/devkitpro
          export DEVKITARM  := /opt/devkitpro/devkitARM
          export DEVKITA64  := /opt/devkitpro/devkitA64

          include $(DEVKITPRO)/libnx/switch_rules

          TARGET      := Launcher-NX
          BUILD       := build
          SOURCES     := .

          APP_TITLE   := Launcher-NX
          APP_AUTHOR  := Homebrew Dev
          APP_VERSION := 1.0.0

          include $(DEVKITPRO)/devkitA64/base_rules
          EOF

      # 3. Runs native make to link with crt0.o and clear all console crash bugs
      - name: Run Protected Compilation Rules
        run: |
          export PATH=/opt/devkitpro/devkitA64/bin:$PATH
          make

      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./*.nro
