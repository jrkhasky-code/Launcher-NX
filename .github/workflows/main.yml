name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    # Uses a secure, verified community action container with the full Switch SDK already baked in
    container: ghcr.io/fcloutier/devkitpro-switch:latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Runs native make to link with crt0.o and clear all console crash bugs
      - name: Compile Native NRO
        run: |
          make
          
      # Uploads your finished binary under the explicit name Launcher-NX
      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./*.nro
