name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    # Uses the single official pre-built image container hosting the complete toolchain internally
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Runs the native pre-bundled builder to clear all relocation map errors instantly
      - name: Compile via Native Architecture
        run: |
          export PATH=$DEVKITPRO/devkitA64/bin:$PATH
          make
          
      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./*.nro
