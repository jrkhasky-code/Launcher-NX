name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Auto Generate Framework Makefile
        run: |
          # 1. Dynamically write out a pure Makefile that the platform container natively understands
          cat << 'EOF' > Makefile
          export DEVKITPRO  := /opt/devkitpro
          export DEVKITARM  := /opt/devkitpro/devkitARM
          export DEVKITA64  := /opt/devkitpro/devkitA64

          include $(DEVKITPRO)/libnx/switch_rules

          TARGET      := Launcher-NX
          BUILD       := build
          # Instruct the native building template to look directly in the flat root folder
          SOURCES     := .
          DATA        := data
          INCLUDES    := include

          APP_TITLE   := Launcher-NX
          APP_AUTHOR  := Homebrew Dev
          APP_VERSION := 1.0.0

          include $(DEVKITPRO)/devkitA64/base_rules
          EOF

      - name: Compile via Native Architecture
        run: |
          # 2. Run standard, protected compilation rules
          make

      - name: Upload Launcher-NX Binary
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./*.nro
