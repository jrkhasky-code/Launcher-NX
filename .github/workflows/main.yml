name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Installs the official devkitPro toolchain on the cloud server cleanly
      - name: Install Official Switch SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg gdebi-core
          wget https://devkitpro.org
          sudo gdebi -n devkitpro-keyring.deb
          echo "deb https://devkitpro.org stable main" | sudo tee /etc/apt/sources.list.d/devkitpro.list
          sudo apt-get update
          sudo apt-get install -y devkitA64 switch-dev

      # Compiles using the native toolchain environment
      - name: Build Application
        run: |
          export PATH=/opt/devkitpro/devkitA64/bin:$PATH
          make

      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./*.nro
