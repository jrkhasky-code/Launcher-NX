name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Compiles your code directly without calling apt, wget, or any network connections
      - name: Static Freestanding Compile
        run: |
          export PATH=$DEVKITPRO/devkitA64/bin:$PATH
          
          # 1. Compile source into an ARM64 standalone object file
          aarch64-none-elf-g++ -O2 -ffunction-sections -fdata-sections -fno-exceptions -fno-rtti -c main.cpp -o main.o
          
          # 2. Link object as a clean freestanding binary to eliminate relocation map crashes
          aarch64-none-elf-g++ -static -nostdlib main.o -lgcc -o Launcher-NX.elf
          
          # 3. Convert that raw static file payload directly into your clean executable Switch .nro format
          elf2nro Launcher-NX.elf Launcher-NX.nro --title="Launcher-NX" --author="Homebrew Dev" --version="1.0.0"

      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./Launcher-NX.nro
