name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 1. Automatically downloads, unlocks, and configures the complete native Switch SDK
      - name: Set up devkitPro Switch Environment
        uses: devkitpro/actions-setup-devkitpro@v1
        with:
          dkp-packages: switch-dev

      # 2. Uses devkitpro's official internal building parameters to compile your code error-free
      - name: Compile and Link Launcher-NX
        run: |
          export PATH=$DEVKITPRO/devkitA64/bin:$PATH
          
          # Compile main.cpp with proper platform reference lookups
          aarch64-none-elf-g++ -O2 -ffunction-sections -fdata-sections -fPIE -march=armv8-a+crc+crypto -mtune=cortex-a57 -I$DEVKITPRO/libnx/include -c main.cpp -o main.o
          
          # Link using the officially injected switch.specs configuration map to fix all relocation errors
          aarch64-none-elf-g++ -specs=$DEVKITPRO/libnx/switch.specs -march=armv8-a+crc+crypto -mtune=cortex-a57 -Wl,-Map,Launcher-NX.map -fPIE -pie main.o -L$DEVKITPRO/libnx/lib -lnx -o Launcher-NX.elf
          
          # Convert the final binary package into the clean executable Switch application format
          elf2nro Launcher-NX.elf Launcher-NX.nro --title="Launcher-NX" --author="Homebrew Dev" --version="1.0.0"

      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./Launcher-NX.nro
