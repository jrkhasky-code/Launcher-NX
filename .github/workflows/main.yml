name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 1. Download official devkitpro apt repositories directly from their primary source mirrors
      - name: Install Official devkitPro Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg gdebi-core
          
          # Pull and install the verified devkitPro archive keys
          wget https://devkitpro.org
          sudo gdebi -n devkitpro-keyring.deb
          
          # Add the verified repository path to the system sources list
          echo "deb https://devkitpro.org stable main" | sudo tee /etc/apt/sources.list.d/devkitpro.list
          sudo apt-get update
          
          # Install the explicit standalone compilers and switch execution system vectors
          sudo apt-get install -y devkitA64 switch-dev

      # 2. Compile using the official system path variables
      - name: Build Application
        run: |
          export PATH=/opt/devkitpro/devkitA64/bin:$PATH
          make

      # 3. Deliver your completed, stable Launcher-NX file bundle
      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./*.nro
