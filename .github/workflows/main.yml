name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 1. Clone the complete open-source libnx directly into memory space
      - name: Fetch and Compile Switch OS Layers
        run: |
          export PATH=$DEVKITPRO/devkitA64/bin:$PATH
          git clone --depth 1 https://github.com libnx_src
          
          # Compile the true system library objects cleanly
          make -C libnx_src -j$(nproc)
          
          # Move built dependencies to accessible workspace paths
          mkdir -p ./sys_deps/include ./sys_deps/lib
          cp -r libnx_src/nx/include/* ./sys_deps/include/
          cp libnx_src/nx/lib/libnx.a ./sys_deps/lib/
          cp libnx_src/nx/lib/crt0.o ./sys_deps/lib/
          cp libnx_src/nx/switch.specs ./sys_deps/lib/

      # 2. Compile against real hardware hooks to guarantee Atmosphere stability
      - name: Compile and Link Launcher-NX
        run: |
          export PATH=$DEVKITPRO/devkitA64/bin:$PATH
          
          # Compile using local platform definitions
          aarch64-none-elf-g++ -O2 -ffunction-sections -fdata-sections -fPIE -march=armv8-a+crc+crypto -mtune=cortex-a57 -I./sys_deps/include -c main.cpp -o main.o
          
          # Link using verified Switch runtime boundaries
          aarch64-none-elf-g++ -specs=./sys_deps/lib/switch.specs -march=armv8-a+crc+crypto -mtune=cortex-a57 -Wl,-Map,Launcher-NX.map -fPIE -pie main.o ./sys_deps/lib/crt0.o -L./sys_deps/lib -lnx -o Launcher-NX.elf
          
          # Package cleanly into your final console-ready app format
          elf2nro Launcher-NX.elf Launcher-NX.nro --title="Launcher-NX" --author="Homebrew Dev" --version="1.0.0"

      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./Launcher-NX.nro
