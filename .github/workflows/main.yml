name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 1. Automatically invoke CMake to build the absolute fixed target ELF mappings
      - name: Configure CMake Environment
        run: |
          export PATH=$DEVKITPRO/devkitA64/bin:$PATH
          mkdir build
          cd build
          cmake ..

      # 2. Run the native linker engine to output a protected binary structure
      - name: Compile and Link Binaries
        run: |
          export PATH=$DEVKITPRO/devkitA64/bin:$PATH
          cd build
          make

      # 3. Use the official packaging utility to generate an authentic Switch executable
      - name: Package Native Executable
        run: |
          export PATH=$DEVKITPRO/devkitA64/bin:$PATH
          elf2nro ./build/Launcher-NX ./Launcher-NX.nro --title="Launcher-NX" --author="Homebrew Dev" --version="1.0.0"

      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./Launcher-NX.nro
