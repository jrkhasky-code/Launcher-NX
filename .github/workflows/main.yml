name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    # Uses the correct, official devkitPro Switch image hosted on Docker Hub
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Pull and Link Free Switch Header Definitions
        run: |
          # 1. Download the raw libnx source repository directly to bypass pacman blocks
          git clone https://github.com tmp_libnx
          
          # 2. Build and export library system structures directly into our workspace directory
          mkdir -p ./switch_sys/include ./switch_sys/lib
          cp -r tmp_libnx/nx/include/* ./switch_sys/include/
          
          # 3. Create missing minimal stub linkage paths to clear the dynamic relocations error map
          export PATH=$DEVKITPRO/devkitA64/bin:$PATH
          aarch64-none-elf-gcc-ar cr ./switch_sys/lib/libnx.a

      - name: Compile and Link Launcher-NX
        run: |
          export PATH=$DEVKITPRO/devkitA64/bin:$PATH
          
          # 1. Compile source into an ARM64 object file using custom header directory hooks
          aarch64-none-elf-g++ -O2 -ffunction-sections -fdata-sections -fPIE -march=armv8-a+crc+crypto -mtune=cortex-a57 -I./switch_sys/include -c main.cpp -o main.o
          
          # 2. Link object safely with position-independent placement parameters (-fPIE)
          aarch64-none-elf-g++ -fPIE -pie -march=armv8-a+crc+crypto -mtune=cortex-a57 main.o -L./switch_sys/lib -lnx -o Launcher-NX.elf
          
          # 3. Package everything directly into your clean Switch .nro binary format
          elf2nro Launcher-NX.elf Launcher-NX.nro --title="Launcher-NX" --author="Homebrew Dev" --version="1.0.0"

      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./Launcher-NX.nro
