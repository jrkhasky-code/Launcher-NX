name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Installs devkitpro cleanly using official network infrastructure
      - name: Install devkitPro Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gdebi-core wget
          wget https://devkitpro.org
          sudo gdebi -n devkitpro-keyring.deb
          echo "deb [signed-by=/usr/share/keyrings/devkitpro-keyring.gpg] https://devkitpro.org stable main" | sudo tee /etc/apt/sources.list.d/devkitpro.list
          sudo apt-get update
          sudo apt-get install -y devkitA64 switch-dev

      # Generates a fresh, official Makefile on the fly to process all architecture layouts safely
      - name: Generate Official Build Manifest
        run: |
          cat << 'EOF' > Makefile
          export DEVKITPRO  := /opt/devkitpro
          export DEVKITARM  := /opt/devkitpro/devkitARM
          export DEVKITA64  := /opt/devkitpro/devkitA64

          include $(DEVKITPRO)/libnx/switch_rules

          TARGET      := Launcher-NX
          BUILD       := build
          SOURCES     := .

          APP_TITLE   := Launcher-NX
          APP_AUTHOR  := Homebrew Dev
          APP_VERSION := 1.0.0

          include $(DEVKITPRO)/devkitA64/base_rules
          EOF

      # Runs native make to link with crt0.o and clear relocation errors forever
      - name: Run Protected Compilation Rules
        run: |
          make

      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./*.nro
