name: Build Launcher-NX

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Compiles the flat C++ code using position-independent mapping without external repository downloads
      - name: Compile and Link Launcher-NX
        run: |
          export PATH=$DEVKITPRO/devkitA64/bin:$PATH
          
          # 1. Compile source into an ARM64 object file
          aarch64-none-elf-g++ -O2 -ffunction-sections -fdata-sections -fPIE -march=armv8-a+crc+crypto -mtune=cortex-a57 -c main.cpp -o main.o
          
          # 2. Link object as a standalone dynamic object to fix all read-only relocations errors
          aarch64-none-elf-g++ -shared -fPIE -pie -march=armv8-a+crc+crypto -mtune=cortex-a57 main.o -o Launcher-NX.elf
          
          # 3. Package everything directly into your clean Switch .nro binary format
          elf2nro Launcher-NX.elf Launcher-NX.nro --title="Launcher-NX" --author="Homebrew Dev" --version="1.0.0"

      - name: Upload Launcher-NX
        uses: actions/upload-artifact@v4
        with:
          name: Launcher-NX
          path: ./Launcher-NX.nro
